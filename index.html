<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAI - 测测你是什么猫格</title>
    <style>
        /* 纸片简约风 / 粗野主义设计 (Neo-Brutalism) */
        :root {
            --bg-color: #fff9f0;
            --text-color: #2b2b2b;
            --border-color: #2b2b2b;
            --primary-color: #ffd166; /* 橘猫黄 */
            --secondary-color: #ef476f; /* 肉垫粉 */
            --accent-color: #118ab2; /* 蓝猫蓝 */
            --card-shadow: 6px 6px 0px var(--border-color);
            --btn-shadow: 4px 4px 0px var(--border-color);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            background-color: white;
            width: 100%;
            max-width: 500px;
            border: 3px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 30px 20px;
            position: relative;
            overflow: hidden;
        }

        h1, h2, h3 { margin-top: 0; }

        /* 进度条 */
        .progress-container {
            width: 100%;
            height: 12px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            background: white;
            margin-bottom: 20px;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 按钮与选项 */
        .btn {
            display: block;
            width: 100%;
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            transition: all 0.1s ease;
            text-align: left;
            line-height: 1.4;
        }
        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-color);
        }
        .btn-start {
            background-color: var(--primary-color);
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
        }
        .option:hover { background-color: var(--bg-color); }

        /* 页面切换控制 */
        .screen { display: none; }
        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 结果页特殊样式 */
        
        /* 1️⃣ 新增：立绘图片容器样式 */
        .cat-illustration {
            width: 100%;
            height: 220px;
            background-color: var(--bg-color);
            border: 3px solid var(--border-color);
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 15px;
            box-shadow: 4px 4px 0px var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        .cat-illustration img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 确保图片铺满且不变形 */
        }
        
        .cat-illustration .placeholder-text {
            position: absolute;
            color: #888;
            font-weight: bold;
        }

        .result-type {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            color: var(--accent-color);
            margin: 10px 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        .result-name {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .result-box {
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.6;
        }
        .product-box {
            background: var(--secondary-color);
            color: white;
            border: 2px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 4px 4px 0px var(--border-color);
        }
        .product-box h3 { margin-bottom: 10px; color: white; }
        
        /* 2️⃣ 修改：将按钮适配为 <a> 标签的样式 */
        .buy-btn {
            display: inline-block;
            text-decoration: none;
            background: white;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 2px 2px 0px var(--border-color);
            transition: all 0.1s ease;
        }
        .buy-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-color);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-start" class="screen active">
        <h1 style="font-size: 36px; text-align: center;">🐱 CATI</h1>
        <h2 style="text-align: center;">测测你的内在猫格</h2>
        <p style="text-align: center; color: #666; line-height: 1.6;">
            放弃抵抗吧！在这个充满伪人、吗喽和牛马的世界里，<br>
            你的灵魂深处，究竟藏着一只什么状态的猫？<br>
            （全网首发·极度真实·轻微发疯）
        </p>
        <button class="btn btn-start" onclick="startTest()">开始诊断 🐾</button>
    </div>

    <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="screen-question" class="screen">
        <p style="color: #888; font-size: 14px; font-weight: bold;" id="q-counter">1 / 15</p>
        <h2 id="q-title" style="font-size: 20px; margin-bottom: 20px; line-height: 1.4;"></h2>
        <button class="btn option" id="opt-a" onclick="selectOption('A')"></button>
        <button class="btn option" id="opt-b" onclick="selectOption('B')"></button>
    </div>

    <div id="screen-result" class="screen">
        <h3 style="text-align: center; color: #666; margin-bottom: 0;">你的鉴定报告出来了...</h3>
        
        <div class="cat-illustration">
            <span class="placeholder-text" id="r-img-placeholder">图片加载中...</span>
            <img id="r-img" src="" alt="猫咪立绘" style="display: none;" onload="this.style.display='block'; document.getElementById('r-img-placeholder').style.display='none';">
        </div>

        <div class="result-type" id="r-type">ECFD</div>
        <div class="result-name" id="r-name">😼 赛博悍匪猫</div>
        
        <div class="result-box">
            <strong>【人格解析】</strong><br>
            <span id="r-desc">这里是解析文案</span>
        </div>

        <div class="product-box">
            <h3>💊 你的专属精神解药</h3>
            <p id="r-product-desc" style="font-size: 14px; margin-bottom: 15px;">这里是带货话术</p>
            <div style="font-size: 24px; margin-bottom: 10px;" id="r-product-name">【玩具名称】</div>
            
            <a href="#" target="_blank" class="buy-btn" id="r-shop-link">立即拿下 🛒</a>
        </div>
    </div>
</div>

<script>
    // --- 题库数据 ---
    const questions = [
        // 社交力 (E/I)
        { t: "周末朋友突然组局喊你出去嗨，你的真实内心OS是：", 
          a: "冲！这周的班我是一秒钟都上不下去了，必须出去撒野！", aVal: "E", 
          b: "烦死了，又要洗头化妆。能不能装死假装没看到消息？", bVal: "I" },
        { t: "在群里不小心发错了一个极其丢人的表情包，你会：", 
          a: "只要我不尴尬，尴尬的就是别人，顺势再发十个表情包刷屏！", aVal: "E", 
          b: "光速撤回，并在接下来的三天里连夜制定逃离地球的计划。", bVal: "I" },
        { t: "路上遇到极其心动的Crush，你的操作是：", 
          a: "走上前去一记直球：“嗨，能加个微信吗？”", aVal: "E", 
          b: "默默记下长相，回家疯狂搜索，现实中连对视都不敢。", bVal: "I" },
        { t: "进了一家陌生的店，导购非常热情地迎上来，你会：", 
          a: "顺水推舟跟她聊起来，甚至走的时候加了导购微信。", aVal: "E", 
          b: "浑身紧绷，脚趾抠地，只说一句“我随便看看”然后火速逃离。", bVal: "I" },
        
        // 精神状态 (C/B)
        { t: "晚上11点半，你本该睡觉了，但此刻你的大脑：", 
          a: "突然异常清醒！开始复盘十年前那场没吵赢的架，或思考宇宙起源。", aVal: "C", 
          b: "自动关机中。天塌下来也得等我睡醒再说。", bVal: "B" },
        { t: "面对领导/老师突如其来的无理要求（比如周末加班），你的第一反应：", 
          a: "内心有1万只尖叫鸡在咆哮，恨不得当场创死所有人！", aVal: "C", 
          b: "“哦，好的。”心如止水，熟练地打开摸鱼软件开始混时间。", bVal: "B" },
        { t: "吃瓜吃到自己认识的人身上，你的状态是：", 
          a: "瞳孔地震！上蹿下跳在各个群里疯狂转发：“惊天大瓜！速来！”", aVal: "C", 
          b: "默默看完聊天记录，内心毫无波澜地打出一个“哦”。", bVal: "B" },
        { t: "当你遭遇人生挫折（比如丢了钱/搞砸了项目）时：", 
          a: "持续性精神内耗，反复折磨自己，甚至想半夜去阳台嚎两嗓子。", aVal: "C", 
          b: "叹口气，点杯最贵的奶茶/外卖安慰自己，吃完就算了。", bVal: "B" },
          
        // 脾气底色 (S/F)
        { t: "有求于人时（比如找朋友借VIP账号），你会：", 
          a: "熟练切换萌妹/奶狗语气，疯狂发“求求了”“贴贴”等表情包。", aVal: "S", 
          b: "强装镇定，直奔主题，如果对方拒绝就冷酷地说“行，拉倒”。", bVal: "F" },
        { t: "别人对你进行“画大饼”式的长篇大论说教时：", 
          a: "表面乖巧点头，疯狂附和“对对对”“您说得太有道理了”。", aVal: "S", 
          b: "眉头紧锁，随时准备阴阳怪气地怼回去，主打一个天生反骨。", bVal: "F" },
        { t: "谈恋爱或交朋友时，你的边界感是：", 
          a: "喜欢谁就恨不得24小时黏在一起，连体婴本婴。", aVal: "S", 
          b: "莫挨老子！保持距离产生美，太黏糊会让我感到窒息。", bVal: "F" },
          
        // 行动力 (D/L)
        { t: "看到桌子边缘放着一个即将掉下去的水杯，你的手：", 
          a: "不知道为什么，就是很想轻轻推一把看它碎掉……", aVal: "D", 
          b: "懒得管，只要别砸到我脚上就行。", bVal: "L" },
        { t: "拿到一个期待已久的新快递，你的处理方式：", 
          a: "暴力撕开快递盒，包装扔得满天飞，主打一个迫不及待！", aVal: "D", 
          b: "放在角落积灰三天，等哪天实在无聊了才想起来拿剪刀慢慢拆。", bVal: "L" },
        { t: "放假在家时，你最常见的姿势是：", 
          a: "根本闲不住！大扫除、重新布置房间、甚至想把地板抠出花来。", aVal: "D", 
          b: "床—沙发—马桶—床，像一滩液体一样融入家具。", bVal: "L" },
        { t: "面对生活里的麻烦事，你的解决哲学是：", 
          a: "一顿操作猛如虎，不管三七二十一先折腾一番再说！", aVal: "D", 
          b: "拖延症晚期。只要我不理它，麻烦就会自己解决。", bVal: "L" }
    ];

    // --- 结果归类逻辑与带货文案 ---
    const resultsData = {
        "悍匪": {
            name: "😼 赛博悍匪猫 (奶牛猫体质)",
            desc: "你就是传说中人见人愁、狗见狗愁的纯正悍匪！精力旺盛到可以单挑整个小区，精神状态遥遥领先，每天不是在发疯就是在发疯的路上。破坏力极强，拒绝内耗，直接发疯！",
            productDesc: "你的内在/你的主子急需物理发泄！完美消耗你们无处安放的破坏欲，拯救你家的沙发！",
            productName: "【解压猫隧道】",
            // 👇 替换为你的【悍匪猫】图链及对应的【小红书商品链接】
            imgSrc: "https://test.fukit.cn/autoupload/f/dp1Cc7AVkEP1Zv8P3DqoMdiO_OyvX7mIgxFBfDMDErs/20260415/Vg4M/332X332/IMG_8771%281%29.JPG/webp", 
            shopLink: "https://xhslink.com/m/85LwwsiGzLR" 
        },
        "白月光": {
            name: "🍵 绿茶白月光猫 (布偶猫体质)",
            desc: "你将“非暴力不合作”演绎到了极致。表面甜美乖巧，实则懒癌晚期。能坐着绝不站着，最喜欢在暗处默默吃瓜，主打一个毫不费力的松弛感。天生就是享福的命！",
            productDesc: "只有顶级的精神抚慰才能配得上高贵的你。适合你的猫抱着狂吸，躺着就能获得颅内高潮，符合你躺平的人设！",
            productName: "【纯羊毛大号猫棉签玩具】",
            // 👇 替换为你的【白月光猫】图链及对应的【小红书商品链接】
            imgSrc: "https://test.fukit.cn/autoupload/f/dp1Cc7AVkEP1Zv8P3DqoMdiO_OyvX7mIgxFBfDMDErs/20260415/Qg2g/294X294/IMG_8771%282%29.JPG/webp", 
            shopLink: "https://xhslink.com/m/87cfDAMRXNh" 
        },
        "吗喽": {
            name: "🐒 阴暗爬行吗喽猫 (黑猫体质)",
            desc: "白天装死，半夜精神；生人面前社恐，熟人面前重拳出击。你看起来软趴趴的，但内心藏着一个随时准备爆炸的小宇宙，谁惹你谁倒霉，随时准备阴暗爬行。",
            productDesc: "你的阴暗面需要被治愈！躲在角落里偷偷玩，不用社交也能释放捕猎天性，一人一猫共同解压。",
            productName: "【手搓逗猫棒头 (含替换装)】",
            // 👇 替换为你的【吗喽猫】图链及对应的【小红书商品链接】
            imgSrc: "https://test.fukit.cn/autoupload/f/dp1Cc7AVkEP1Zv8P3DqoMdiO_OyvX7mIgxFBfDMDErs/20260415/yUSo/320X320/IMG_8771%283%29.JPG/webp", 
            shopLink: "https://xhslink.com/m/2veNhikksSz" 
        },
        "贪吃": {
            name: "🍗 腹黑贪吃猫 (大橘为重)",
            desc: "看起来情绪稳定、人畜无害，实际上为了吃可以不择手段。有点小聪明，有点小腹黑，最喜欢一边揣手手一边用眼神指使别人干活，十橘九手贱说的就是你。",
            productDesc: "没有什么比吃更能驱动你了！用美食和智慧控制TA的破坏欲，让TA在吃中安静下来，不再烦你！",
            productName: "【掏掏乐冻干藏食玩具】",
            // 👇 替换为你的【贪吃猫】图链及对应的【小红书商品链接】
            imgSrc: "https://test.fukit.cn/autoupload/f/dp1Cc7AVkEP1Zv8P3DqoMdiO_OyvX7mIgxFBfDMDErs/20260415/8h9n/340X340/IMG_8771.JPG/webp", 
            shopLink: "https://xhslink.com/m/1IpZW2XqTeb" 
        }
    };

    // 状态管理
    let currentIdx = 0;
    let scores = { E:0, I:0, C:0, B:0, S:0, F:0, D:0, L:0 };

    function startTest() {
        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('screen-question').classList.add('active');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('q-counter').innerText = `${currentIdx + 1} / 15`;
        document.getElementById('q-title').innerText = q.t;
        
        const btnA = document.getElementById('opt-a');
        const btnB = document.getElementById('opt-b');
        
        btnA.innerText = "A. " + q.a;
        btnA.onclick = () => handleAnswer(q.aVal);
        
        btnB.innerText = "B. " + q.b;
        btnB.onclick = () => handleAnswer(q.bVal);

        // 更新进度条
        const percent = ((currentIdx) / 15) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
    }

    function handleAnswer(val) {
        scores[val]++;
        currentIdx++;
        
        if (currentIdx < questions.length) {
            renderQuestion();
        } else {
            document.getElementById('progress-bar').style.width = '100%';
            setTimeout(showResult, 300);
        }
    }

    function showResult() {
        document.getElementById('screen-question').classList.remove('active');
        document.getElementById('progress-container').style.display = 'none';
        
        // 计算四字人格
        const dim1 = scores.E >= scores.I ? 'E' : 'I';
        const dim2 = scores.C >= scores.B ? 'C' : 'B';
        const dim3 = scores.S >= scores.F ? 'S' : 'F';
        const dim4 = scores.D >= scores.L ? 'D' : 'L';
        const finalType = dim1 + dim2 + dim3 + dim4;

        // 粗略归类逻辑
        let categoryKey = "贪吃"; // 默认兜底
        if (dim1 === 'E' && dim4 === 'D') categoryKey = "悍匪";
        else if (dim2 === 'B' && dim4 === 'L') categoryKey = "白月光";
        else if (dim1 === 'I' && dim2 === 'C') categoryKey = "吗喽";
        else if (dim2 === 'B' && dim4 === 'D') categoryKey = "贪吃";
        else if (dim1 === 'I' && dim4 === 'L') categoryKey = "白月光";
        else if (dim2 === 'C' && dim3 === 'F') categoryKey = "吗喽";
        else categoryKey = "悍匪"; // 剩余暴躁老哥一律打成悍匪

        const res = resultsData[categoryKey];

        // 渲染文案
        document.getElementById('r-type').innerText = finalType;
        document.getElementById('r-name').innerText = res.name;
        document.getElementById('r-desc').innerText = res.desc;
        document.getElementById('r-product-desc').innerText = res.productDesc;
        document.getElementById('r-product-name').innerText = res.productName;
        
        // 渲染立绘和购物链接
        document.getElementById('r-img').src = res.imgSrc;
        document.getElementById('r-shop-link').href = res.shopLink;

        document.getElementById('screen-result').classList.add('active');
    }
</script>

</body>
</html>
